<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #121212; --accent: #CCFF00; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; padding-bottom: 90px; }
        .bento-card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; position: relative; overflow: hidden; }
        .glass-nav { background: rgba(18,18,18,0.95); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.08); }
        .input-field { background: #1A1A1A; color: white; border: 1px solid #333; outline: none; transition: 0.2s; }
        .input-field:focus { border-color: var(--accent); }
        .edit-tool { display: none !important; }
        body.edit-mode .edit-tool { display: flex !important; }
        .modal-overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; }
        .loader { width: 20px; height: 20px; border: 2px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="select-none overflow-x-hidden">

    <div id="loading" class="fixed inset-0 flex flex-col items-center justify-center bg-black z-[60]">
        <div class="loader mb-2"></div>
    </div>

    <div id="modal-weight" class="hidden fixed inset-0 z-50 modal-overlay p-4">
        <div class="bg-[#121212] w-full max-w-sm rounded-3xl p-6 border border-zinc-800 shadow-2xl">
            <h3 class="text-xl font-black italic mb-6 text-white">Текущий вес</h3>
            <input id="new-weight" type="number" step="0.1" placeholder="Вес (кг)" class="input-field w-full p-4 rounded-2xl font-bold text-sm">
            <div class="flex gap-3 mt-6">
                <button onclick="closeModal('modal-weight')" class="flex-1 bg-zinc-900 text-zinc-400 py-4 rounded-2xl font-bold text-xs uppercase">Отмена</button>
                <button onclick="submitWeight()" class="flex-1 bg-[#CCFF00] text-black py-4 rounded-2xl font-bold text-xs uppercase">Сохранить</button>
            </div>
        </div>
    </div>

    <div id="modal-custom-macros" class="hidden fixed inset-0 z-50 modal-overlay p-4">
        <div class="bg-[#121212] w-full max-w-sm rounded-3xl p-6 border border-zinc-800 shadow-2xl">
            <h3 class="text-xl font-black italic mb-6 text-white">Твои цели КБЖУ</h3>
            <input id="custom-cals" type="number" placeholder="Ккал (всего)" class="input-field w-full p-4 rounded-2xl mb-3 font-bold text-lg text-[#CCFF00]">
            <div class="grid grid-cols-3 gap-2">
                <input id="custom-prot" type="number" placeholder="Белки" class="input-field w-full p-3 rounded-2xl font-bold text-sm text-center">
                <input id="custom-fats" type="number" placeholder="Жиры" class="input-field w-full p-3 rounded-2xl font-bold text-sm text-center">
                <input id="custom-carbs" type="number" placeholder="Угли" class="input-field w-full p-3 rounded-2xl font-bold text-sm text-center">
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="closeModal('modal-custom-macros')" class="flex-1 bg-zinc-900 text-zinc-400 py-4 rounded-2xl font-bold text-xs uppercase">Отмена</button>
                <button onclick="submitCustomMacros()" class="flex-1 bg-[#CCFF00] text-black py-4 rounded-2xl font-bold text-xs uppercase shadow-[0_0_15px_rgba(204,255,0,0.2)]">Сохранить</button>
            </div>
        </div>
    </div>

    <div id="app-container" class="hidden opacity-0 transition-opacity duration-500">
        <header class="px-6 pt-6 pb-2 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img id="u-photo" src="" class="w-10 h-10 rounded-full object-cover border border-white/10 hidden">
                <div id="u-initials" class="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center text-xs font-bold text-zinc-400">ID</div>
                <div>
                    <h1 id="u-name" class="text-md font-bold leading-tight">...</h1>
                    <span id="u-tier" class="text-[9px] text-zinc-500 font-bold uppercase tracking-wider">Loading...</span>
                </div>
            </div>
            <button onclick="toggleEditMode()" id="btn-edit" class="w-10 h-10 rounded-full bg-zinc-900 flex items-center justify-center text-zinc-400 hover:text-white transition-colors active:scale-95">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
            </button>
        </header>

        <section id="tab-stats" class="px-5 pt-4 fade-in">
            <div id="macros-container" class="mb-4"></div>
            
            <div class="grid grid-cols-2 gap-3 mb-6 relative">
                <div class="bento-card p-4">
                    <span class="text-[9px] text-zinc-500 font-bold uppercase tracking-wider">Тренировок</span>
                    <p id="u-count" class="text-3xl font-black italic tracking-tighter mt-1">0</p>
                </div>
                <div class="bento-card p-4">
                     <span class="text-[9px] text-zinc-500 font-bold uppercase tracking-wider">Вода сегодня</span>
                     <p class="text-3xl font-black italic tracking-tighter text-blue-400 mt-1"><span id="u-water">0</span><span class="text-sm">л</span></p>
                </div>
            </div>

            <div class="flex items-center justify-between mb-3 px-1">
                <h2 class="text-xs font-bold text-white uppercase tracking-widest">Журнал веса</h2>
                <button onclick="openModal('modal-weight')" class="bg-zinc-800 text-[#CCFF00] px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase border border-zinc-700">+ Добавить</button>
            </div>
            <div id="u-records" class="space-y-3 mb-8"></div>
            
            <div class="flex items-center justify-between mb-3 px-1">
                <h2 class="text-xs font-bold text-white uppercase tracking-widest">История тренировок</h2>
            </div>
            <div id="u-history" class="space-y-2 pb-4"></div>
        </section>

        <section id="tab-calc" class="px-5 pt-4 hidden fade-in">
             <h2 class="text-2xl font-black italic tracking-tighter mb-6">КАЛЬКУЛЯТОР <span class="text-[#CCFF00]">КБЖУ</span></h2>
             <div class="space-y-5">
                <div class="grid grid-cols-2 gap-3 p-1 bg-[#1A1A1A] rounded-xl">
                    <label class="cursor-pointer"><input type="radio" name="gender" value="male" class="peer sr-only" checked><div class="py-3 text-center text-xs font-bold uppercase rounded-lg text-zinc-500 peer-checked:bg-[#2A2A2A] peer-checked:text-white transition-all">Мужчина</div></label>
                    <label class="cursor-pointer"><input type="radio" name="gender" value="female" class="peer sr-only"><div class="py-3 text-center text-xs font-bold uppercase rounded-lg text-zinc-500 peer-checked:bg-[#2A2A2A] peer-checked:text-white transition-all">Женщина</div></label>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="c-weight" class="input-field w-full p-4 rounded-2xl font-bold text-sm" placeholder="Вес (кг)">
                    <input type="number" id="c-height" class="input-field w-full p-4 rounded-2xl font-bold text-sm" placeholder="Рост (см)">
                </div>
                <input type="number" id="c-age" class="input-field w-full p-4 rounded-2xl font-bold text-sm" placeholder="Возраст">
                <div class="relative">
                    <select id="c-activity" class="input-field w-full p-4 rounded-2xl font-bold text-xs appearance-none uppercase">
                        <option value="1.2">Сидячий (1.2)</option>
                        <option value="1.375">Лёгкая (1-3/нед)</option>
                        <option value="1.55">Средняя (3-5/нед)</option>
                        <option value="1.725">Высокая (6-7/нед)</option>
                    </select>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <label class="cursor-pointer"><input type="radio" name="goal" value="cut" class="peer sr-only"><div class="py-3 border border-zinc-800 rounded-xl text-center text-[10px] font-bold uppercase text-zinc-500 peer-checked:border-[#CCFF00] peer-checked:text-[#CCFF00]">Сушка</div></label>
                    <label class="cursor-pointer"><input type="radio" name="goal" value="maintain" class="peer sr-only" checked><div class="py-3 border border-zinc-800 rounded-xl text-center text-[10px] font-bold uppercase text-zinc-500 peer-checked:border-white peer-checked:text-white">Норма</div></label>
                    <label class="cursor-pointer"><input type="radio" name="goal" value="bulk" class="peer sr-only"><div class="py-3 border border-zinc-800 rounded-xl text-center text-[10px] font-bold uppercase text-zinc-500 peer-checked:border-red-500 peer-checked:text-red-500">Масса</div></label>
                </div>
                <button type="button" onclick="calculateMacros()" class="w-full bg-[#CCFF00] text-black py-4 rounded-2xl font-black uppercase text-sm shadow-[0_0_20px_rgba(204,255,0,0.2)] active:scale-95 transition-transform">Рассчитать</button>
            </div>
            <div id="calc-result" class="hidden mt-8 bento-card p-6 border-t-4 border-[#CCFF00] mb-8">
                <div class="text-center mb-4">
                    <h3 id="res-total" class="text-4xl font-black italic text-white">0</h3>
                    <p class="text-xs font-bold uppercase text-zinc-500">ккал / день</p>
                </div>
                <div class="grid grid-cols-3 gap-2 text-center mb-6">
                    <div class="bg-zinc-900/50 p-2 rounded-lg"><p class="text-[9px] font-bold uppercase text-zinc-500">Белки</p><p id="res-p" class="font-bold text-sm">0</p></div>
                    <div class="bg-zinc-900/50 p-2 rounded-lg"><p class="text-[9px] font-bold uppercase text-zinc-500">Жиры</p><p id="res-f" class="font-bold text-sm">0</p></div>
                    <div class="bg-zinc-900/50 p-2 rounded-lg"><p class="text-[9px] font-bold uppercase text-zinc-500">Угли</p><p id="res-c" class="font-bold text-sm">0</p></div>
                </div>
                <button id="btn-save" onclick="saveMacros()" class="w-full bg-[#1A1A1A] text-white border border-zinc-800 py-3 rounded-2xl font-bold uppercase text-xs active:scale-95 transition-transform">Сохранить</button>
            </div>
        </section>

        <nav class="fixed bottom-0 left-0 right-0 glass-nav h-[80px] pb-5 flex justify-around items-center z-50">
            <button onclick="switchTab('stats')" id="btn-stats" class="flex flex-col items-center justify-center w-16 h-full group">
                <svg class="w-6 h-6 text-[#CCFF00] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                <span class="text-[9px] font-bold uppercase mt-1 text-[#CCFF00]">Статы</span>
            </button>
            <button onclick="switchTab('calc')" id="btn-calc" class="flex flex-col items-center justify-center w-16 h-full group">
                <svg class="w-6 h-6 text-zinc-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                <span class="text-[9px] font-bold uppercase mt-1 text-zinc-600">КБЖУ</span>
            </button>
        </nav>
    </div>

    <script>
        const N8N_URL = "https://lkn123.app.n8n.cloud/webhook-test/miniapp-api"; 
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        let globalData = null;
        let isEditMode = false;
        let currentMacros = null;

        window.onload = () => {
            const initData = tg.initData;
            if (!initData) return;
            
            const photoUrl = tg.initDataUnsafe?.user?.photo_url;
            if (photoUrl) {
                document.getElementById('u-photo').src = photoUrl;
                document.getElementById('u-photo').classList.remove('hidden');
                document.getElementById('u-initials').classList.add('hidden');
            }

            loadData(initData);
        };

        function loadData(initData) {
            fetch(`${N8N_URL}?auth=${encodeURIComponent(initData)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) { globalData = data; renderApp(data); } 
                });
        }

        function renderApp(data) {
            document.getElementById('u-name').innerText = data.name || "User";
            document.getElementById('u-tier').innerText = data.subscription || "FREE";
            document.getElementById('u-tier').style.color = data.subscription?.toUpperCase() === 'PREMIUM' ? '#CCFF00' : '#A1A1AA';
            
            document.getElementById('u-water').innerText = (data.water_today / 1000).toFixed(1);
            document.getElementById('u-count').innerText = data.history.length;

            renderMacrosWidget(data.macros);
            renderWeight(data.weight_history);
            renderHistory(data.history);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('app-container').classList.remove('hidden', 'opacity-0');
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            document.body.classList.toggle('edit-mode');
            const btn = document.getElementById('btn-edit');
            btn.style.color = isEditMode ? '#CCFF00' : '#A1A1AA';
        }

        function renderMacrosWidget(macros) {
            const container = document.getElementById('macros-container');
            const hasMacros = macros && macros.cals > 0;

            if (hasMacros) {
                container.innerHTML = `
                    <div class="bento-card p-5 relative border-l-4 border-[#CCFF00]">
                        <div class="absolute top-0 right-0 w-24 h-24 bg-[#CCFF00] opacity-[0.03] blur-[40px] rounded-full pointer-events-none"></div>
                        <div class="flex justify-between items-center mb-3">
                            <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Твой План</p>
                            <button onclick="deleteMacros()" class="edit-tool text-red-500 bg-red-500/10 px-2 py-0.5 rounded text-[10px] font-bold uppercase">Удалить</button>
                        </div>
                        <div class="flex items-baseline space-x-2 mb-4">
                            <h3 class="text-3xl font-black italic text-white">${macros.cals}</h3>
                            <span class="text-xs text-zinc-600 font-bold uppercase">ккал</span>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            <div class="bg-black/40 p-2 rounded-lg text-center"><p class="text-[8px] text-zinc-500 uppercase font-bold">Белки</p><p class="text-xs font-bold text-zinc-200">${macros.p}</p></div>
                            <div class="bg-black/40 p-2 rounded-lg text-center"><p class="text-[8px] text-zinc-500 uppercase font-bold">Жиры</p><p class="text-xs font-bold text-zinc-200">${macros.f}</p></div>
                            <div class="bg-black/40 p-2 rounded-lg text-center"><p class="text-[8px] text-zinc-500 uppercase font-bold">Угли</p><p class="text-xs font-bold text-zinc-200">${macros.c}</p></div>
                        </div>
                    </div>`;
            } else {
                container.innerHTML = `
                    <div onclick="openModal('modal-custom-macros')" class="edit-tool justify-center w-full py-4 border border-dashed border-zinc-800 rounded-2xl text-center text-xs font-bold text-zinc-500 uppercase cursor-pointer hover:border-[#CCFF00] hover:text-[#CCFF00] transition-colors">
                        + Добавить цель КБЖУ
                    </div>`;
            }
        }

        function renderWeight(list) {
            const container = document.getElementById('u-records');
            if (!list || list.length === 0) { container.innerHTML = '<p class="text-zinc-700 text-xs italic text-center py-4">Нет записей</p>'; return; }
            container.innerHTML = list.map(r => `
                <div class="bento-card p-4 mb-3 border-l-4 border-[#CCFF00] flex justify-between items-center group relative">
                    <button onclick="deleteItem(${r.rowIndex}, this, 'delete_weight')" class="edit-tool absolute top-2 right-2 w-8 h-8 bg-red-500/10 text-red-500 rounded-lg items-center justify-center z-20">✕</button>
                    <span class="text-xs text-zinc-500 font-bold">${r.date}</span>
                    <span class="text-2xl font-black italic text-[#CCFF00]">${r.weight} <span class="text-xs text-zinc-500 uppercase">кг</span></span>
                </div>
            `).join('');
        }

        function renderHistory(list) {
            const container = document.getElementById('u-history');
            if (!list || list.length === 0) { container.innerHTML = '<p class="text-zinc-700 text-xs italic text-center py-4">Нет данных</p>'; return; }
            container.innerHTML = list.map(h => `
                <div class="py-3 border-b border-zinc-900 flex justify-between items-center group relative">
                    <div>
                        <p class="text-[10px] font-bold text-zinc-500">${h.date} | ${h.program || 'Без программы'}</p>
                        <p class="text-sm font-bold text-white uppercase">${h.group || 'Тренировка'}</p>
                    </div>
                </div>
            `).join('');
        }

        function submitWeight() {
            const weight = document.getElementById('new-weight').value;
            if(!weight) return;
            closeModal('modal-weight');
            fetch(`${N8N_URL}?auth=${encodeURIComponent(tg.initData)}&action=add_weight&weight=${weight}`).then(() => loadData(tg.initData));
        }

        function submitCustomMacros() {
            const cals = document.getElementById('custom-cals').value;
            const p = document.getElementById('custom-prot').value;
            const f = document.getElementById('custom-fats').value;
            const c = document.getElementById('custom-carbs').value;
            if(!cals) return;
            closeModal('modal-custom-macros');
            currentMacros = { cals, p, f, c };
            saveMacros(true);
        }

        function saveMacros(isCustom = false) {
            if (!currentMacros) return;
            if(!isCustom) document.getElementById('btn-save').innerText = "Сохранение...";
            fetch(`${N8N_URL}?auth=${encodeURIComponent(tg.initData)}&action=save_macros&cals=${currentMacros.cals}&prot=${currentMacros.p}&fats=${currentMacros.f}&carbs=${currentMacros.c}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        if(!isCustom) {
                            document.getElementById('btn-save').innerText = "Сохранено!";
                            setTimeout(() => switchTab('stats'), 500);
                        }
                        loadData(tg.initData);
                    }
                });
        }

        function deleteMacros() {
            fetch(`${N8N_URL}?auth=${encodeURIComponent(tg.initData)}&action=delete_macros`)
                .then(res => res.json())
                .then(d => {
                    if(d.success) {
                        globalData.macros = {cals:0};
                        renderMacrosWidget(globalData.macros);
                    }
                });
        }

        function deleteItem(rowIndex, btn, actionType) {
            const row = btn.closest('.bento-card') || btn.closest('.py-3');
            row.style.opacity = '0';
            setTimeout(() => row.style.display = 'none', 300);
            fetch(`${N8N_URL}?auth=${encodeURIComponent(tg.initData)}&action=${actionType}&row=${rowIndex}`)
                .then(res => res.json())
                .then(d => {
                    if(d.success) loadData(tg.initData);
                });
        }

        function calculateMacros() {
            const w = document.getElementById('c-weight').value;
            const h = document.getElementById('c-height').value;
            const a = document.getElementById('c-age').value;
            const act = document.getElementById('c-activity').value;
            const goal = document.querySelector('input[name="goal"]:checked').value;
            const gen = document.querySelector('input[name="gender"]:checked').value;
            if(!w || !h || !a) return;
            let bmr = (10*w) + (6.25*h) - (5*a) + (gen==='male'?5:-161);
            let tdee = bmr * act;
            if(goal==='cut') tdee *= 0.85; else if(goal==='bulk') tdee *= 1.15;
            const cals = Math.round(tdee);
            currentMacros = { cals, p: Math.round(cals*0.3/4), f: Math.round(cals*0.25/9), c: Math.round(cals*0.45/4) };
            document.getElementById('res-total').innerText = cals;
            document.getElementById('res-p').innerText = currentMacros.p;
            document.getElementById('res-f').innerText = currentMacros.f;
            document.getElementById('res-c').innerText = currentMacros.c;
            document.getElementById('calc-result').classList.remove('hidden');
            document.getElementById('calc-result').scrollIntoView({behavior:'smooth'});
        }

        function switchTab(t) {
            ['stats','calc'].forEach(x => document.getElementById(`tab-${x}`).classList.add('hidden'));
            document.getElementById(`tab-${t}`).classList.remove('hidden');
            const c1 = '#CCFF00', c2 = '#A1A1AA';
            const s = document.getElementById('btn-stats'), c = document.getElementById('btn-calc');
            s.querySelector('svg').style.color = t==='stats'?c1:c2; s.querySelector('span').style.color = t==='stats'?c1:c2;
            c.querySelector('svg').style.color = t==='calc'?c1:c2; c.querySelector('span').style.color = t==='calc'?c1:c2;
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    </script>
</body>
</html>
